<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Behold - 君临奇境</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --accent: #ff3b30; --ai-green: #00ff88; }
        body { margin: 0; background: #000; color: white; font-family: -apple-system; overflow: hidden; height: 100vh; }
        
        #video-bg { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; background: #111; }
        
        #security-overlay {
            position: fixed; inset: 0; z-index: 999;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }

        .prompter-container {
            position: fixed; top: 120px; width: 80%; left: 10%; height: 200px;
            z-index: 10; overflow: hidden; pointer-events: none;
            mask-image: linear-gradient(to bottom, transparent, #000 20%, #000 80%, transparent);
        }
        #prompter-content { font-size: 26px; line-height: 1.5; color: var(--ai-green); transition: transform 0.2s linear; }

        #growth-track {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(20px);
        }
        .achievement-card {
            background: linear-gradient(145deg, #1e1e1e, #111);
            padding: 30px; border-radius: 24px; border: 1px solid var(--ai-green);
            text-align: center; width: 80%;
        }

        .bubble-window {
            position: absolute; width: 130px; height: 130px;
            border-radius: 50% 50% 50% 5%;
            border: 2px solid var(--ai-green); z-index: 50; bottom: 130px; right: 20px;
            overflow: hidden; box-shadow: 0 0 20px rgba(0,255,136,0.2);
            background: #000;
        }

        .visualizer {
            display: flex; align-items: center; justify-content: center; gap: 3px; height: 100%;
        }
        .bar { width: 4px; background: var(--ai-green); border-radius: 2px; animation: glow 1s infinite; }
        @keyframes glow { 0%, 100% { height: 10px; } 50% { height: 40px; } }

        .controls { position: fixed; bottom: 40px; width: 100%; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .record-btn { width: 80px; height: 80px; border-radius: 50%; border: 4px solid white; display: flex; justify-content: center; align-items: center; background: none; }
        .record-btn-inner { width: 65px; height: 65px; background: var(--accent); border-radius: 50%; transition: 0.3s; }
        .recording .record-btn-inner { width: 30px; height: 30px; border-radius: 8px; }
        .btn-side { padding: 12px 20px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.6); background: rgba(0,0,0,0.4); color: white; font-size: 14px; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div id="security-overlay">
        <h2>君临奇境 Behold</h2>
        <p id="security-desc">正在检测安全环境...</p>
        <button id="start-node" style="padding: 15px 40px; border-radius: 30px; border: none; background: var(--ai-green); font-weight: bold; display: none;" onclick="initSystem()">开启视窗</button>
    </div>

    <video id="video-bg" autoplay playsinline muted></video>
    
    <div class="prompter-container">
        <div id="prompter-content">
            欢迎降临。<br><br>这是你的第一个自媒体里程碑。<br><br>保持自信，眼神聚焦在气泡上方。<br><br>Behold 正在优化你的表达轨迹...
        </div>
    </div>

    <div class="bubble-window" id="bubble" onclick="switchCamera()">
        <video id="video-bubble" autoplay playsinline muted></video>
    </div>

    <div class="controls">
        <button class="btn-side" onclick="optimizeScript()">🪄 AI 优化</button>
        <button class="record-btn" onclick="toggleRecord()">
            <div class="record-btn-inner"></div>
        </button>
        <button class="btn-side" onclick="switchCamera()">🔄 切换</button>
    </div>

    <div id="growth-track"></div>

    <script>
        let currentStream = null;
        let currentFacingMode = "user";
        let scrollPos = 0;
        let scrollInterval;
        let startTime;

        let history = JSON.parse(localStorage.getItem('behold_history') || '[]');

        window.onload = () => {
            const isHttps = location.protocol === 'https:' || location.hostname === 'localhost';
            const desc = document.getElementById('security-desc');
            const btn = document.getElementById('start-node');

            if (!isHttps) {
                desc.innerHTML = "⚠️ 需要 HTTPS 环境<br><small>请确保使用 GitHub Pages 访问</small>";
                desc.style.color = "#ff3b30";
            } else {
                desc.innerText = "✨ 环境已就绪";
                btn.style.display = "block";
            }

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(e => console.log('SW Error'));
            }
        };

        async function initSystem() {
            document.getElementById('security-overlay').style.opacity = "0";
            setTimeout(() => { document.getElementById('security-overlay').style.display = "none"; }, 300);
            await startCamera(currentFacingMode);
        }

        async function startCamera(mode) {
            if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); }
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: mode, width: 1280 },
                    audio: true
                });
                const bgVideo = document.getElementById('video-bg');
                const bubble = document.getElementById('bubble');
                bgVideo.srcObject = currentStream;

                if (mode === "user") {
                    bgVideo.style.transform = "scaleX(-1)";
                    bubble.innerHTML = `<div class="visualizer">
                        <div class="bar" style="animation-delay:0s"></div>
                        <div class="bar" style="animation-delay:0.2s"></div>
                        <div class="bar" style="animation-delay:0.4s"></div>
                    </div>`;
                } else {
                    bgVideo.style.transform = "scaleX(1)";
                    bubble.innerHTML = `<video id="video-bubble" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;transform:scaleX(-1)"></video>`;
                    document.getElementById('video-bubble').srcObject = currentStream;
                }
            } catch (err) { alert("授权失败: " + err); }
        }

        function optimizeScript() {
            const prompter = document.getElementById('prompter-content');
            prompter.style.color = "#00dbff";
            prompter.innerHTML = "✨ [AI 已重写]<br><br>观众朋友们，我是 [你的名字]。<br><br>今天我们要聊一个打破常规的话题...<br><br>(眼神保持在气泡上方，微笑)";
        }

        function toggleRecord() {
            document.body.classList.toggle('recording');
            const isRecording = document.body.classList.contains('recording');
            
            if(isRecording) {
                startTime = Date.now();
                startPrompter();
            } else {
                stopRecord();
            }
        }

        function startPrompter() {
            scrollPos = 0;
            scrollInterval = setInterval(() => {
                scrollPos -= 0.8;
                document.getElementById('prompter-content').style.transform = `translateY(${scrollPos}px)`;
            }, 30);
        }

        function stopRecord() {
            clearInterval(scrollInterval);
            const duration = Math.floor((Date.now() - startTime) / 1000);
            const score = Math.min(100, 70 + Math.random() * 30).toFixed(0);
            
            const record = { date: new Date().toLocaleDateString(), duration, score };
            history.push(record);
            localStorage.setItem('behold_history', JSON.stringify(history));
            
            showGrowthTrack(record);
        }

        function showGrowthTrack(lastRecord) {
            const track = document.getElementById('growth-track');
            track.style.display = 'flex';
            track.innerHTML = `
                <div class="achievement-card">
                    <h2 style="color:var(--ai-green)">✨ 成就达成！</h2>
                    <p>本次录制时长：${lastRecord.duration} 秒</p>
                    <p>AI 表现评分：<span style="font-size:32px">${lastRecord.score}</span></p>
                    <hr style="border:0.5px solid #333; margin:20px 0">
                    <p style="font-size:14px; color:#aaa">成长轨迹：已记录 ${history.length} 次奇境降临</p>
                    <button onclick="closeTrack()" style="margin-top:20px; padding:10px 30px; border-radius:20px; border:none; background:var(--ai-green); font-weight:bold;">继续进化</button>
                </div>
            `;
        }

        function closeTrack() {
            document.getElementById('growth-track').style.display = 'none';
            resetPrompter();
        }

        function resetPrompter() {
            scrollPos = 0;
            document.getElementById('prompter-content').style.transform = `translateY(0px)`;
        }

        function switchCamera() {
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            startCamera(currentFacingMode);
        }
    </script>
</body>
</html>
