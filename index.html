<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Behold - 君临奇境</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --ios-bg: #000;
            --accent: #ff3b30;
        }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--ios-bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* 模拟 iOS 状态栏 */
        .status-bar {
            position: fixed;
            top: 0; width: 100%;
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 100;
            font-size: 14px;
            font-weight: 600;
        }

        /* 主画布：模拟相机预览 */
        #camera-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1c1c1e; /* 模拟后置镜头未开启状态 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 气泡悬浮窗：前置镜头模拟 */
        .bubble-window {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.8);
            background: #3a3a3c;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: move;
            z-index: 50;
            bottom: 150px;
            right: 20px;
            overflow: hidden;
        }

        /* 底部控制条 */
        .controls {
            position: fixed;
            bottom: 40px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .record-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 4px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
        }

        .record-btn-inner {
            width: 60px;
            height: 60px;
            background: var(--accent);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .recording .record-btn-inner {
            width: 28px;
            height: 28px;
            border-radius: 6px;
        }

        /* 提词器区域 */
        .teleprompter {
            width: 80%;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            font-size: 18px;
            color: #00ff00;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div class="status-bar">
        <span>9:41</span>
        <div style="display: flex; gap: 5px;">
            <span>📶</span><span>🔋</span>
        </div>
    </div>

    <div id="camera-canvas">
        <span id="bg-label">后置摄像头预览区域</span>
        </div>

    <div class="bubble-window" id="bubble">
        <span style="font-size: 12px;">前置/自我</span>
    </div>

    <div class="controls">
        <div class="teleprompter">
            点击录制，开始你的“君临奇境”之旅...
        </div>
        <button class="record-btn" onclick="toggleRecord()">
            <div class="record-btn-inner" id="btn-inner"></div>
        </button>
    </div>

    <script>
        // 1. 处理拖拽逻辑 (移动端 Touch)
        const bubble = document.getElementById('bubble');
        let active = false;
        let currentX;
        let currentY;
        let initialX;
        let initialY;
        let xOffset = 0;
        let yOffset = 0;

        bubble.addEventListener("touchstart", dragStart, false);
        bubble.addEventListener("touchend", dragEnd, false);
        bubble.addEventListener("touchmove", drag, false);

        function dragStart(e) {
            initialX = e.touches[0].clientX - xOffset;
            initialY = e.touches[0].clientY - yOffset;
            if (e.target === bubble) active = true;
        }

        function drag(e) {
            if (active) {
                e.preventDefault();
                currentX = e.touches[0].clientX - initialX;
                currentY = e.touches[0].clientY - initialY;
                xOffset = currentX;
                yOffset = currentY;
                setTranslate(currentX, currentY, bubble);
            }
        }

        function setTranslate(xPos, yPos, el) {
            el.style.transform = "translate3d(" + xPos + "px, " + yPos + "px, 0)";
        }

        function dragEnd() {
            active = false;
        }

        // 2. 录制按钮切换
        let isRecording = false;
        function toggleRecord() {
            isRecording = !isRecording;
            document.body.classList.toggle('recording');
            const label = document.getElementById('bg-label');
            label.innerText = isRecording ? "🔴 正在通过数字视窗观测世界..." : "已停止。准备好下一次降临了吗？";
        }
    </script>
</body>
</html>
