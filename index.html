<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Behold - 君临奇境</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --ios-bg: #000;
            --accent: #ff3b30;
        }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--ios-bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* 模拟 iOS 状态栏 */
        .status-bar {
            position: fixed;
            top: 0; width: 100%;
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 100;
            font-size: 14px;
            font-weight: 600;
        }

        /* 主画布：模拟相机预览 */
        #camera-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1c1c1e; /* 模拟后置镜头未开启状态 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 气泡悬浮窗：前置镜头模拟 */
        .bubble-window {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.8);
            background: #3a3a3c;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: move;
            z-index: 50;
            bottom: 150px;
            right: 20px;
            overflow: hidden;
        }

        /* 底部控制条 */
        .controls {
            position: fixed;
            bottom: 40px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .record-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 4px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
        }

        .record-btn-inner {
            width: 60px;
            height: 60px;
            background: var(--accent);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .recording .record-btn-inner {
            width: 28px;
            height: 28px;
            border-radius: 6px;
        }

        /* 提词器区域 */
        .teleprompter {
            width: 80%;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            font-size: 18px;
            color: #00ff00;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div class="status-bar">
        <span>9:41</span>
        <div style="display: flex; gap: 5px;">
            <span>📶</span><span>🔋</span>
        </div>
    </div>

    <div id="camera-canvas">
        <span id="bg-label">后置摄像头预览区域</span>
        </div>

    <div class="bubble-window" id="bubble">
        <span style="font-size: 12px;">前置/自我</span>
    </div>

    <div class="controls">
        <div class="teleprompter">
            点击录制，开始你的“君临奇境”之旅...
        </div>
        <button class="record-btn" onclick="toggleRecord()">
            <div class="record-btn-inner" id="btn-inner"></div>
        </button>
    </div>

    <script>
        // 1. 拖拽逻辑 (保持不变)
const bubble = document.getElementById('bubble');
let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;
bubble.addEventListener("touchstart", dragStart, false);
bubble.addEventListener("touchend", dragEnd, false);
bubble.addEventListener("touchmove", drag, false);
function dragStart(e) { initialX = e.touches[0].clientX - xOffset; initialY = e.touches[0].clientY - yOffset; if (e.target === bubble) active = true; }
function drag(e) { if (active) { e.preventDefault(); currentX = e.touches[0].clientX - initialX; currentY = e.touches[0].clientY - initialY; xOffset = currentX; yOffset = currentY; setTranslate(currentX, currentY, bubble); } }
function setTranslate(xPos, yPos, el) { el.style.transform = "translate3d(" + xPos + "px, " + yPos + "px, 0)"; }
function dragEnd() { active = false; }

// 2. 核心：摄像头调用逻辑 (New!)
async function initCameras() {
    const canvas = document.getElementById('camera-canvas');
    const bubble = document.getElementById('bubble');

    try {
        // 创建两个视频元素
        const bgVideo = document.createElement('video');
        const bubbleVideo = document.createElement('video');

        // 配置视频属性
        [bgVideo, bubbleVideo].forEach(v => {
            v.setAttribute('autoplay', '');
            v.setAttribute('playsinline', '');
            v.style.width = '100%';
            v.style.height = '100%';
            v.style.objectFit = 'cover';
        });

        // 获取所有摄像头设备
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(device => device.kind === 'videoinput');

        // 尝试获取前置和后置流
        // 提示：部分浏览器限制同时开启两个摄像头，我们会先尝试开启前置放入气泡
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user" }, // 先拿前置做测试
            audio: true 
        });
        
        bubbleVideo.srcObject = stream;
        bubble.innerHTML = ''; // 清除文字
        bubble.appendChild(bubbleVideo);

        // 如果想让背景也显示内容（比如后置），这里需要处理逻辑切换
        // 目前先让背景保持黑色以节省性能，或者镜像前置流
        const bgStream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: { exact: "environment" } } 
        }).catch(() => stream); // 如果没后置就用前置

        bgVideo.srcObject = bgStream;
        canvas.innerHTML = '';
        canvas.appendChild(bgVideo);

    } catch (err) {
        console.error("镜头启动失败: ", err);
        alert("请确保在 HTTPS 环境下运行并允许摄像头权限");
    }
}

// 3. 录制与启动
let isRecording = false;
function toggleRecord() {
    isRecording = !isRecording;
    document.body.classList.toggle('recording');
    if(isRecording) {
        initCameras(); // 点击录制时请求权限并启动
    }
}
    </script>
</body>
</html>
