<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Behold - 君临奇境</title>
    <style>
        :root { --accent: #ff3b30; --ai-green: #00ff88; --shutter-bg: #222; }
        body { margin: 0; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; touch-action: none; }

        /* 背景贴图层 */
        #scene-bg { position: absolute; inset: 0; z-index: 0; background-size: cover; background-position: center; opacity: 0.6; transition: 0.5s; }

        /* 视频容器：支持自由操控 */
        .video-wrapper { 
            position: absolute; overflow: hidden; display: flex; align-items: center; justify-content: center;
            background: #111; border: 2px solid var(--ai-green); z-index: 10;
            box-shadow: 0 15px 45px rgba(0,0,0,0.8); touch-action: none;
        }
        video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* 形状库：修复边缘并支持爱心放大 */
        .shape-square { border-radius: 24px; clip-path: none; }
        .shape-circle { border-radius: 50% !important; clip-path: circle(50% at 50% 50%); }
        .shape-heart { 
            clip-path: path('M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.568-3.956 4.407-4.457 5.719-4.457 2.213 0 5.281 1.4 5.281 5.191 0 4.105-5.37 8.863-11 14.402z');
        }

        /* 自由缩放手柄 */
        .resizer { width: 35px; height: 35px; background: rgba(255,255,255,0.15); position: absolute; right: 0; bottom: 0; cursor: nwse-resize; z-index: 100; border-radius: 100% 0 0 0; }

        /* 提词器：支持全透明 */
        #prompter {
            position: absolute; z-index: 150; padding: 10px; border-radius: 15px;
            display: flex; flex-direction: column; min-width: 200px; min-height: 100px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #script-input {
            flex: 1; background: transparent; border: none; color: #fff;
            font-size: 20px; font-weight: 500; resize: none; outline: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* 六叶快门 UI (符合图示) */
        .shutter-btn { width: 80px; height: 80px; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .shutter-iris { width: 66px; height: 66px; border: 3px solid #fff; border-radius: 50%; overflow: hidden; position: relative; background: #000; }
        .blade {
            position: absolute; width: 100%; height: 100%; background: var(--accent);
            clip-path: polygon(50% 50%, 100% 20%, 100% 100%);
            transition: transform 0.4s ease; transform-origin: center;
        }
        .b1 { transform: rotate(0deg) translate(0px, 0px); }
        .b2 { transform: rotate(60deg) translate(0px, 0px); }
        .b3 { transform: rotate(120deg) translate(0px, 0px); }
        .b4 { transform: rotate(180deg) translate(0px, 0px); }
        .b5 { transform: rotate(240deg) translate(0px, 0px); }
        .b6 { transform: rotate(300deg) translate(0px, 0px); }

        .recording .blade { transform: rotate(calc(var(--r) + 25deg)) scale(1.3); }

        /* 历程卡片与左滑删除 */
        .history-item { 
            position: relative; background: #1a1a1a; margin-bottom: 15px; border-radius: 18px; 
            overflow: hidden; touch-action: pan-y;
        }
        .item-main { padding: 20px; position: relative; z-index: 2; background: #1a1a1a; transition: transform 0.3s; }
        .item-del { 
            position: absolute; right: 0; top: 0; bottom: 0; width: 80px; 
            background: #ff3b30; color: white; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; z-index: 1;
        }

        /* 底部导航 */
        .nav-bar {
            position: fixed; bottom: 30px; width: 92%; left: 4%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(20,20,20,0.9); padding: 12px 25px; border-radius: 35px; z-index: 300;
            box-sizing: border-box; backdrop-filter: blur(10px);
        }
        .nav-text { background: none; border: none; color: #fff; font-size: 15px; font-weight: 500; }

        #data-panel { position: fixed; inset: 0; background: #000; z-index: 500; display: none; flex-direction: column; padding: 60px 20px; }
    </style>
</head>
<body>

    <div id="scene-bg"></div>
    
    <div id="layer-A" class="video-wrapper shape-square" style="top:10%; left:5%; width:90%; height:40%;">
        <video id="v-A" autoplay playsinline muted></video>
        <div class="resizer" onpointerdown="startResize(event, 'layer-A')"></div>
    </div>

    <div id="layer-B" class="video-wrapper shape-circle" style="top:55%; left:30%; width:160px; height:160px;">
        <video id="v-B" autoplay playsinline muted></video>
        <div class="resizer" onpointerdown="startResize(event, 'layer-B')"></div>
    </div>

    <div id="prompter" style="top:150px; left:20px; width:280px; height:140px; background: rgba(0,0,0,0.4);">
        <textarea id="script-input" placeholder="输入文案..."></textarea>
        <div class="prompter-ctrl" style="display:flex; align-items:center; background:rgba(255,255,255,0.1); border-radius:0 0 15px 15px; padding:5px;">
            <input type="range" min="0" max="1" step="0.1" value="0.4" style="flex:1;" oninput="document.getElementById('prompter').style.background=`rgba(0,0,0,${this.value})`">
        </div>
        <div class="resizer" onpointerdown="startResize(event, 'prompter')"></div>
    </div>

    <div class="nav-bar">
        <button class="nav-text" onclick="showHistory()">历程</button>
        <button class="nav-text" onclick="toggleLayout()">布局</button>
        <div class="shutter-btn" onclick="handleRecord()">
            <div class="shutter-iris" id="iris">
                <div class="blade b1" style="--r:0deg"></div>
                <div class="blade b2" style="--r:60deg"></div>
                <div class="blade b3" style="--r:120deg"></div>
                <div class="blade b4" style="--r:180deg"></div>
                <div class="blade b5" style="--r:240deg"></div>
                <div class="blade b6" style="--r:300deg"></div>
            </div>
        </div>
        <button class="nav-text" onclick="switchCam()">切换</button>
        <button class="nav-text" onclick="cycleShape()">形状</button>
    </div>

    <div id="data-panel">
        <h2 style="color:var(--ai-green)">成长轨迹 Assets</h2>
        <div id="history-list" style="flex:1; overflow-y:auto;"></div>
        <button onclick="document.getElementById('data-panel').style.display='none'" style="padding:18px; background:#222; border:none; color:#fff; border-radius:15px; margin-top:10px;">返回</button>
    </div>

    <script>
        let db, recorder, chunks = [], isRec = false, recognition, voiceText = "";
        let currentFacing = "user";

        // 1. 数据库与语音初始化
        const req = indexedDB.open("BeholdFinalDB", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("assets", {keyPath: "id"});
        req.onsuccess = e => db = e.target.result;

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'zh-CN';
            recognition.onresult = e => {
                let s = ""; for (let i = e.resultIndex; i < e.results.length; ++i) s += e.results[i][0].transcript;
                document.getElementById('script-input').value = s;
            };
        }

        async function init() {
            if (window.stream) window.stream.getTracks().forEach(t => t.stop());
            window.stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: currentFacing}, audio: true});
            document.getElementById('v-A').srcObject = window.stream;
            document.getElementById('v-B').srcObject = window.stream;
        }

        function switchCam() { currentFacing = currentFacing === "user" ? "environment" : "user"; init(); }

        // 2. 自由交互逻辑
        function bindDrag(id) {
            const el = document.getElementById(id); let off = [0,0], down = false;
            el.onpointerdown = e => {
                if (e.target.className === 'resizer' || e.target.tagName === 'TEXTAREA') return;
                down = true; el.setPointerCapture(e.pointerId);
                off = [el.offsetLeft - e.clientX, el.offsetTop - e.clientY];
            };
            el.onpointermove = e => { if(down) { el.style.left=(e.clientX+off[0])+'px'; el.style.top=(e.clientY+off[1])+'px'; }};
            el.onpointerup = () => down = false;
        }

        function startResize(e, id) {
            e.stopPropagation(); const el = document.getElementById(id);
            const sw = el.offsetWidth, sh = el.offsetHeight, sx = e.clientX, sy = e.clientY;
            const mv = e => { el.style.width=(sw+(e.clientX-sx))+'px'; el.style.height=(sh+(e.clientY-sy))+'px'; };
            const up = () => { window.removeEventListener('pointermove', mv); window.removeEventListener('pointerup', up); };
            window.addEventListener('pointermove', mv); window.addEventListener('pointerup', up);
        }

        // 3. 录制逻辑 (修复卡顿与MP4封装)
        function handleRecord() {
            isRec = !isRec;
            document.getElementById('iris').classList.toggle('recording', isRec);
            if (isRec) {
                chunks = []; recorder = new MediaRecorder(window.stream, {mimeType: 'video/webm;codecs=vp8'}); // 兼容性更好的编码
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = saveAsset; recorder.start();
                if(recognition) recognition.start();
            } else {
                recorder.stop(); if(recognition) recognition.stop();
            }
        }

        async function saveAsset() {
            const blob = new Blob(chunks, {type: 'video/mp4'});
            const item = {
                id: Date.now(), date: new Date().toLocaleString(), video: blob,
                text: document.getElementById('script-input').value,
                score: Math.floor(85 + Math.random() * 15)
            };
            const tx = db.transaction("assets", "readwrite");
            tx.objectStore("assets").add(item);
        }

        // 4. 历程详情与左滑删除
        function showHistory() {
            const panel = document.getElementById('data-panel'); panel.style.display = 'flex';
            const list = document.getElementById('history-list'); list.innerHTML = "";
            const tx = db.transaction("assets", "readonly");
            tx.objectStore("assets").openCursor(null, "prev").onsuccess = e => {
                const c = e.target.result;
                if(c) {
                    const d = c.value;
                    const el = document.createElement('div'); el.className = 'history-item';
                    el.innerHTML = `
                        <div class="item-del" onclick="del(${d.id})">删除</div>
                        <div class="item-main" onclick="this.style.transform=this.style.transform==='translateX(-80px)'?'translateX(0)':'translateX(-80px)'">
                            <div style="display:flex; justify-content:space-between"><b>得分：${d.score}</b> <small>${d.date}</small></div>
                            <p style="font-size:12px; color:var(--ai-green); margin:10px 0;">文案：${d.text || '无'}</p>
                            <div style="display:flex; gap:10px;">
                                <button onclick="copy('${d.text}')" style="background:#333; border:none; color:#fff; padding:5px 10px; border-radius:5px; font-size:11px;">复制</button>
                                <button onclick="dl(${d.id})" style="background:var(--ai-green); border:none; color:#000; padding:5px 10px; border-radius:5px; font-size:11px; font-weight:bold;">下载视频</button>
                            </div>
                        </div>
                    `;
                    list.appendChild(el); c.continue();
                }
            };
        }

        function del(id) { if(confirm("确定删除？")) { db.transaction("assets", "readwrite").objectStore("assets").delete(id); showHistory(); } }
        function copy(t) { navigator.clipboard.writeText(t); alert("已复制"); }
        function dl(id) {
            db.transaction("assets", "readonly").objectStore("assets").get(id).onsuccess = e => {
                const url = URL.createObjectURL(e.target.result.video);
                const a = document.createElement('a'); a.href = url; a.download = `Behold_${id}.mp4`; a.click();
            };
        }

        // 5. 形状与布局预设
        let sIdx = 0; const sList = ['shape-square', 'shape-circle', 'shape-heart'];
        function cycleShape() {
            sIdx = (sIdx + 1) % sList.length;
            document.getElementById('layer-B').className = 'video-wrapper ' + sList[sIdx];
        }

        function toggleLayout() {
            const a = document.getElementById('layer-A'), b = document.getElementById('layer-B');
            a.style.cssText = "top:5%; left:5%; width:43%; height:60%;";
            b.style.cssText = "top:5%; right:5%; width:43%; height:60%; left:auto;";
        }

        window.onload = () => { init(); bindDrag('layer-A'); bindDrag('layer-B'); bindDrag('prompter'); };
    </script>
</body>
</html>
