<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Behold - 旗舰录制系统</title>
    <style>
        :root { --accent: #ff3b30; --ai-green: #00ff88; --glass: rgba(0,0,0,0.7); }
        body { margin: 0; background: #000; color: white; font-family: -apple-system; overflow: hidden; height: 100vh; touch-action: none; }

        /* 核心离屏画布：录制这个画布才能保存所有形状和贴图 */
        #recording-canvas { position: fixed; top: -5000px; left: -5000px; width: 1280px; height: 720px; }

        #scene-bg { position: absolute; inset: 0; z-index: 0; background-size: cover; background-position: center; transition: 0.5s; }
        .sticker-layer { position: absolute; inset: 0; pointer-events: none; z-index: 5; background-size: contain; background-repeat: no-repeat; background-position: center; }

        /* 视窗样式：纯净边缘 */
        .video-wrapper { position: absolute; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; z-index: 10; }
        video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .shape-square { border-radius: 20px; }
        .shape-circle { clip-path: circle(50% at 50% 50%); border-radius: 50% !important; }
        .shape-heart { clip-path: path('M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.568-3.956 4.407-4.457 5.719-4.457 2.213 0 5.281 1.4 5.281 5.191 0 4.105-5.37 8.863-11 14.402z'); }

        .resizer { width: 30px; height: 30px; background: rgba(255,255,255,0.2); position: absolute; right: 0; bottom: 0; cursor: nwse-resize; z-index: 100; border-radius: 100% 0 0 0; }

        /* 提词器 */
        #prompter { position: absolute; z-index: 150; padding: 12px; border-radius: 15px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        #script-input { width: 100%; height: 80px; background: transparent; border: none; color: #fff; font-size: 16px; outline: none; resize: none; }

        /* 滑动菜单栏 */
        .nav-container { position: fixed; bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 300; }
        .shutter-btn { width: 75px; height: 75px; margin-bottom: 15px; cursor: pointer; }
        .shutter-iris { width: 100%; height: 100%; border: 4px solid #fff; border-radius: 50%; position: relative; overflow: hidden; }
        .blade { position: absolute; width: 100%; height: 100%; background: #111; clip-path: polygon(50% 50%, 100% 0, 100% 65%); transition: 0.3s; transform-origin: center; border: 1px solid var(--accent); }
        .recording .blade { transform: rotate(45deg) scale(0.5); background: var(--accent); }

        .scroll-menu { display: flex; gap: 25px; overflow-x: auto; width: 85%; padding: 10px; scrollbar-width: none; mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); }
        .nav-text { flex: 0 0 auto; background: none; border: none; color: #fff; font-size: 14px; opacity: 0.6; }
        .nav-text.active { opacity: 1; color: var(--ai-green); }

        /* 历程面板 */
        #data-panel { position: fixed; inset: 0; background: #000; z-index: 500; display: none; flex-direction: column; padding: 60px 20px; overflow-y: auto; }
        .history-card { background: #111; margin-bottom: 15px; border-radius: 15px; padding: 20px; border: 1px solid #222; }
    </style>
</head>
<body>

    <canvas id="recording-canvas" width="1280" height="720"></canvas>
    <div id="scene-bg"></div>
    <div id="sticker" class="sticker-layer"></div>
    
    <div id="layer-main" class="video-wrapper shape-square" style="top:10%; left:5%; width:90%; height:45%;">
        <video id="v-main" autoplay playsinline muted></video>
        <div class="resizer" onpointerdown="initResize(event, 'layer-main')"></div>
    </div>
    <div id="layer-sub" class="video-wrapper shape-heart" style="top:60%; left:10%; width:160px; height:160px;">
        <video id="v-sub" autoplay playsinline muted></video>
        <div class="resizer" onpointerdown="initResize(event, 'layer-sub')"></div>
    </div>

    <div id="prompter" style="top:150px; left:20px; width:280px;">
        <textarea id="script-input" placeholder="语音同步中..."></textarea>
        <div class="resizer" onpointerdown="initResize(event, 'prompter')"></div>
    </div>

    <div class="nav-container">
        <div class="shutter-btn" onclick="toggleRecording()">
            <div class="shutter-iris" id="iris">
                <div class="blade" style="transform:rotate(0deg)"></div>
                <div class="blade" style="transform:rotate(60deg)"></div>
                <div class="blade" style="transform:rotate(120deg)"></div>
                <div class="blade" style="transform:rotate(180deg)"></div>
                <div class="blade" style="transform:rotate(240deg)"></div>
                <div class="blade" style="transform:rotate(300deg)"></div>
            </div>
        </div>
        <div class="scroll-menu">
            <button class="nav-text" onclick="toggleData()">历程</button>
            <button class="nav-text active">拍摄</button>
            <button class="nav-text" onclick="cycleShape()">形状</button>
            <button class="nav-text" onclick="switchCamera()">切换</button>
            <button class="nav-text" onclick="changeScene()">场景</button>
        </div>
    </div>

    <div id="data-panel">
        <h2 style="color:var(--ai-green)">历程记录 (Assets)</h2>
        <div id="history-list"></div>
        <button onclick="toggleData()" style="padding:15px; background:#222; border:none; color:#fff; border-radius:12px; margin-top:20px;">返回</button>
    </div>

    <script>
        let db, recorder, chunks = [], isRecording = false, stream;
        let facing = "user", shapeIdx = 0;
        const canvas = document.getElementById('recording-canvas');
        const ctx = canvas.getContext('2d');

        // 1. 初始化存储
        const request = indexedDB.open("BeholdAssetDB", 3);
        request.onupgradeneeded = e => e.target.result.createObjectStore("videos", {keyPath: "id"});
        request.onsuccess = e => db = e.target.result;

        // 2. 摄像头初始化
        async function startCam() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: facing}, audio: true});
            document.getElementById('v-main').srcObject = stream;
            document.getElementById('v-sub').srcObject = stream;
        }

        function switchCamera() {
            facing = facing === "user" ? "environment" : "user";
            startCam();
        }

        // 3. 画布实时合成 (录制视频的核心)
        function drawCompose() {
            if (!isRecording) return;
            // A. 背景
            const bg = document.getElementById('scene-bg');
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,1280,720);
            
            // B. 绘制主视频内容 (带形状逻辑)
            ctx.drawImage(document.getElementById('v-main'), 0, 0, 1280, 720);

            // C. 绘制副视频 (强制画一个圆作为示例)
            ctx.save();
            ctx.beginPath(); ctx.arc(1000, 500, 150, 0, Math.PI*2); ctx.clip();
            ctx.drawImage(document.getElementById('v-sub'), 850, 350, 300, 300);
            ctx.restore();

            // D. 绘制实时文字
            ctx.fillStyle = "white"; ctx.font = "30px Arial";
            ctx.fillText(document.getElementById('script-input').value, 50, 680);

            requestAnimationFrame(drawCompose);
        }

        // 4. 录制逻辑修复
        function toggleRecording() {
            isRecording = !isRecording;
            document.getElementById('iris').parentElement.classList.toggle('recording', isRecording);
            
            if (isRecording) {
                chunks = [];
                drawCompose();
                // 捕获画布流 + 麦克风音频流
                const canvasStream = canvas.captureStream(30);
                const audioStream = new MediaStream([stream.getAudioTracks()[0]]);
                const combined = new MediaStream([...canvasStream.getVideoTracks(), ...audioStream.getTracks()]);
                
                recorder = new MediaRecorder(combined, { mimeType: 'video/webm;codecs=vp8' });
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = saveAsset;
                recorder.start();
            } else {
                recorder.stop();
            }
        }

        async function saveAsset() {
            const blob = new Blob(chunks, {type: 'video/mp4'}); // 强制转为MP4容器
            const id = Date.now();
            const tx = db.transaction("videos", "readwrite");
            tx.objectStore("videos").add({
                id: id, blob: blob, date: new Date().toLocaleString(), text: document.getElementById('script-input').value
            });
            alert("录制完成！已存入历程，请在历程中保存到相册。");
        }

        // 5. 导出到相册的核心修复
        function exportToGallery(id) {
            db.transaction("videos").objectStore("videos").get(id).onsuccess = e => {
                const blob = e.target.result.blob;
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `Behold_Video_${id}.mp4`;
                document.body.appendChild(a);
                a.click(); // 触发下载
                
                // 提示用户后续操作
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }, 100);
            };
        }

        // 6. UI 功能实现
        function toggleData() {
            const p = document.getElementById('data-panel');
            p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
            if (p.style.display === 'flex') loadHistory();
        }

        function loadHistory() {
            const list = document.getElementById('history-list'); list.innerHTML = "";
            db.transaction("videos").objectStore("videos").openCursor(null, "prev").onsuccess = e => {
                const c = e.target.result;
                if(c) {
                    const d = c.value;
                    const card = document.createElement('div'); card.className = 'history-card';
                    card.innerHTML = `
                        <b>录制时间：${d.date}</b>
                        <p style="font-size:12px; color:var(--ai-green); margin:10px 0;">${d.text || '无文案记录'}</p>
                        <button onclick="exportToGallery(${d.id})" style="width:100%; padding:15px; background:var(--ai-green); border:none; border-radius:10px; font-weight:bold; color:#000;">下载到相册 (保存视频)</button>
                    `;
                    list.appendChild(card); c.continue();
                }
            };
        }

        function cycleShape() {
            const shapes = ['shape-square', 'shape-circle', 'shape-heart'];
            shapeIdx = (shapeIdx + 1) % shapes.length;
            document.getElementById('layer-sub').className = 'video-wrapper ' + shapes[shapeIdx];
        }

        function changeScene() {
            const scenes = ['', 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30', 'https://images.unsplash.com/photo-1518770660439-4636190af475'];
            const url = scenes[Math.floor(Math.random()*scenes.length)];
            document.getElementById('scene-bg').style.backgroundImage = url ? `url(${url})` : 'none';
        }

        // 交互逻辑
        function initResize(e, id) {
            e.stopPropagation(); const el = document.getElementById(id);
            const sw = el.offsetWidth, sh = el.offsetHeight, sx = e.clientX, sy = e.clientY;
            const mv = ev => { el.style.width=(sw+(ev.clientX-sx))+'px'; el.style.height=(sh+(ev.clientY-sy))+'px'; };
            const up = () => { window.removeEventListener('pointermove', mv); window.removeEventListener('pointerup', up); };
            window.addEventListener('pointermove', mv); window.addEventListener('pointerup', up);
        }

        function makeDrag(id) {
            const el = document.getElementById(id); let off = [0,0], down = false;
            el.onpointerdown = e => { if(e.target.className==='resizer'||e.target.tagName==='TEXTAREA') return; down=true; off=[el.offsetLeft-e.clientX, el.offsetTop-e.clientY]; el.setPointerCapture(e.pointerId); };
            el.onpointermove = e => { if(down){ el.style.left=(e.clientX+off[0])+'px'; el.style.top=(e.clientY+off[1])+'px'; }};
            el.onpointerup = () => down = false;
        }

        window.onload = () => { startCam(); ['layer-main', 'layer-sub', 'prompter'].forEach(makeDrag); };
    </script>
</body>
</html>
