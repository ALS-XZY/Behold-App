<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Behold - 君临奇境</title>
    <style>
        :root { --accent: #ff3b30; --ai-green: #00ff88; --shutter-color: #444; }
        body { margin: 0; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; touch-action: none; }

        /* 背景层 */
        #scene-bg { position: absolute; inset: 0; z-index: 0; background-size: cover; background-position: center; opacity: 0.5; transition: 0.5s; }
        
        /* 自由视频容器：彻底消除边缘残留 */
        .video-wrapper { 
            position: absolute; overflow: hidden; display: flex; align-items: center; justify-content: center;
            background: #000; transition: border-radius 0.3s, transform 0.2s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 2px solid var(--ai-green);
            touch-action: none;
        }
        video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* 主画面布局 */
        #main-wrapper { inset: 0; z-index: 1; }

        /* 自由气泡/分屏窗口 */
        #bubble-wrapper {
            z-index: 100;
        }

        /* 悬浮提词器 */
        #prompter {
            position: absolute; top: 150px; left: 20px; width: 300px; height: 150px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            display: flex; flex-direction: column; z-index: 100;
        }
        #script-input {
            flex: 1; background: transparent; border: none; color: #fff;
            padding: 10px; font-size: 16px; outline: none; resize: none;
        }
        .prompter-tools { display: flex; align-items: center; padding: 5px; background: rgba(255,255,255,0.1); border-radius: 0 0 12px 12px; }
        input[type=range] { flex: 1; accent-color: var(--ai-green); }

        /* 极简文字导航栏 */
        .nav-bar {
            position: fixed; bottom: 30px; width: 94%; left: 3%;
            display: flex; justify-content: space-around; align-items: center;
            background: rgba(20,20,20,0.9); padding: 10px 0; border-radius: 35px; z-index: 200;
        }
        .nav-btn { background: none; border: none; color: #fff; font-size: 14px; font-weight: 500; }
        
        /* 机械快门按钮 */
        .shutter-wrap { width: 75px; height: 75px; position: relative; cursor: pointer; }
        .shutter-blade {
            position: absolute; inset: 0; background: var(--accent);
            clip-path: polygon(50% 50%, 100% 0, 100% 100%); /* 模拟单片扇叶 */
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0,0,0,0.2);
        }
        /* 8片扇叶布局 */
        .blade-1 { transform: rotate(0deg) translate(0, -5px); }
        .blade-2 { transform: rotate(45deg) translate(0, -5px); }
        .blade-3 { transform: rotate(90deg) translate(0, -5px); }
        .blade-4 { transform: rotate(135deg) translate(0, -5px); }
        .blade-5 { transform: rotate(180deg) translate(0, -5px); }
        .blade-6 { transform: rotate(225deg) translate(0, -5px); }
        .blade-7 { transform: rotate(270deg) translate(0, -5px); }
        .blade-8 { transform: rotate(315deg) translate(0, -5px); }

        .recording .shutter-blade { transform: rotate(var(--rot)) scale(1.2) translate(0, 0); }

        /* 历程面板 */
        #data-panel {
            position: fixed; inset: 0; background: #000; z-index: 300; display: none;
            flex-direction: column; padding: 50px 20px;
        }

        /* 1. 形状库优化 */
        .shape-circle { border-radius: 50% !important; border: 2px solid var(--ai-green); }
        .shape-square { border-radius: 24px; clip-path: none; }
        .shape-trapezoid { clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%); border-radius: 15px; }
        .shape-heart { clip-path: path('M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.568-3.956 4.407-4.457 5.719-4.457 2.213 0 5.281 1.4 5.281 5.191 0 4.105-5.37 8.863-11 14.402z'); }
        .shape-star { clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }

        /* 2. 布局缩放逻辑 */
        .layout-split {
            transform: scale(0.85);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 25px;
            border: 4px solid rgba(255,255,255,0.2);
        }

        /* 3. 历程卡片 */
        .history-card {
            background: #1a1a1a; margin-bottom: 10px; border-radius: 12px;
            overflow: hidden; position: relative; transition: transform 0.3s;
        }
        .card-content { padding: 15px; position: relative; z-index: 2; background: #1a1a1a; }
        .delete-btn {
            position: absolute; right: 0; top: 0; bottom: 0; width: 80px;
            background: var(--accent); color: white; display: flex; align-items: center;
            justify-content: center; z-index: 1; font-weight: bold;
        }

        /* 缩放手柄 */
        .resizer { width: 25px; height: 25px; background: rgba(255,255,255,0.3); position: absolute; right: 0; bottom: 0; cursor: nwse-resize; z-index: 110; border-radius: 50% 0 0 0; }

        /* 场景选择器 */
        #scene-picker {
            position: fixed; bottom: 120px; width: 100%; display: none; flex-direction: row;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            padding: 15px; gap: 15px; overflow-x: auto; z-index: 250;
            box-sizing: border-box;
        }
        .scene-card { flex: 0 0 100px; height: 70px; border-radius: 10px; border: 1px solid #555; background-size: cover; position: relative; background-color: #222; }
        .scene-card span { position: absolute; bottom: 5px; width: 100%; text-align: center; font-size: 10px; background: rgba(0,0,0,0.5); color: #fff; }

        .ai-badge {
            position: absolute; top: 10px; right: 10px; background: var(--ai-green);
            color: #000; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="scene-bg"></div>
    
    <div id="main-wrapper" class="video-wrapper shape-square" style="top:10%; left:5%; width:90%; height:40%;">
        <video id="video-bg" autoplay playsinline muted></video>
        <div class="resizer" onpointerdown="initResize(event, 'main-wrapper')"></div>
    </div>

    <div id="bubble-wrapper" class="video-wrapper shape-circle" style="top:55%; left:25%; width:150px; height:150px;">
        <video id="video-bubble" autoplay playsinline muted></video>
        <div class="resizer" onpointerdown="initResize(event, 'bubble-wrapper')"></div>
    </div>

    <div id="prompter">
        <textarea id="script-input" placeholder="输入文案或开始录制以语音转文字..."></textarea>
        <div class="prompter-tools">
            <span style="font-size:10px; margin-right:5px;">透明度</span>
            <input type="range" min="0.1" max="1" step="0.1" value="0.5" oninput="adjOpac(this.value)">
        </div>
        <div class="resizer" onpointerdown="initResize(event, 'prompter')"></div>
    </div>

    <div id="scene-picker"></div>

    <div class="nav-bar">
        <button class="nav-btn" onclick="toggleData()">历程</button>
        <button class="nav-btn" onclick="openScenePicker()">场景</button>
        <div class="shutter-wrap" id="shutter" onclick="handleRecord()">
            <div class="shutter-blade blade-1" style="--rot:0deg"></div>
            <div class="shutter-blade blade-2" style="--rot:45deg"></div>
            <div class="shutter-blade blade-3" style="--rot:90deg"></div>
            <div class="shutter-blade blade-4" style="--rot:135deg"></div>
            <div class="shutter-blade blade-5" style="--rot:180deg"></div>
            <div class="shutter-blade blade-6" style="--rot:225deg"></div>
            <div class="shutter-blade blade-7" style="--rot:270deg"></div>
            <div class="shutter-blade blade-8" style="--rot:315deg"></div>
        </div>
        <button class="nav-btn" onclick="switchCam()">切换</button>
        <button class="nav-btn" onclick="toggleLayout()">布局</button>
        <button class="nav-btn" onclick="changeShape()">形状</button>
    </div>

    <div id="data-panel">
        <h2 style="color:var(--ai-green)">成长轨迹 Assets</h2>
        <div id="history-list" style="flex: 1; overflow-y: auto; margin: 20px 0;"></div>
        <button onclick="toggleData()" style="padding: 18px; background: #222; border: none; color: #fff; border-radius: 12px;">返回</button>
    </div>

    <script>
        let mediaRecorder, recordedChunks = [], currentStream, isRecording = false;
        let facingMode = "user";
        let startTime;
        let layoutIdx = 0;
        let recognition;
        let voiceText = "";

        // 1. 初始化本地数据库 (IndexedDB)
        let db;
        const request = indexedDB.open("BeholdAssetDB", 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("assets", { keyPath: "id" });
        };
        request.onsuccess = e => db = e.target.result;

        // 语音识别初始化
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-CN';
            recognition.onresult = e => {
                let interim = "";
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) voiceText += e.results[i][0].transcript;
                    else interim += e.results[i][0].transcript;
                }
                document.getElementById('script-input').value = voiceText + interim;
            };
        }

        const sceneLibrary = [
            { name: '原生', url: '' },
            { name: '发布会', url: 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30' },
            { name: '讲堂', url: 'https://images.unsplash.com/photo-1517245386807-bb43f82c33c4' },
            { name: '旅游', url: 'https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1' },
            { name: '备忘录', url: 'https://images.unsplash.com/photo-1517842645767-c639042777db' }
        ];

        // 2. 增强形状库
        const shapes = ['shape-square', 'shape-circle', 'shape-trapezoid', 'shape-heart', 'shape-star'];
        let shapeIdx = 0;
        function changeShape() {
            shapeIdx = (shapeIdx + 1) % shapes.length;
            document.getElementById('bubble-wrapper').className = 'video-wrapper ' + shapes[shapeIdx];
            document.getElementById('main-wrapper').className = 'video-wrapper ' + shapes[shapeIdx];
        }

        async function startSystem() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }, 
                    audio: true 
                });
                const bgV = document.getElementById('video-bg');
                const bubV = document.getElementById('video-bubble');
                bgV.srcObject = currentStream;
                bubV.srcObject = currentStream;
                const transform = facingMode === "user" ? "scaleX(-1)" : "scaleX(1)";
                bgV.style.transform = transform;
                bubV.style.transform = transform;
                window.localStream = currentStream;
            } catch (err) { alert("镜头启动失败，请检查权限"); }
        }

        function switchCam() {
            facingMode = facingMode === "user" ? "environment" : "user";
            startSystem();
        }

        // 1. 全自由拖拽逻辑
        function makeDraggable(id) {
            const el = document.getElementById(id);
            let offset = [0,0], isDown = false;
            el.onpointerdown = e => {
                if (e.target.className === 'resizer' || e.target.tagName === 'TEXTAREA') return;
                isDown = true; el.setPointerCapture(e.pointerId);
                offset = [el.offsetLeft - e.clientX, el.offsetTop - e.clientY];
            };
            el.onpointermove = e => {
                if (!isDown) return;
                el.style.left = (e.clientX + offset[0]) + 'px';
                el.style.top = (e.clientY + offset[1]) + 'px';
            };
            el.onpointerup = () => isDown = false;
        }

        // 2. 自由缩放逻辑
        function initResize(e, id) {
            e.stopPropagation();
            const el = document.getElementById(id);
            const startW = el.offsetWidth, startH = el.offsetHeight;
            const startX = e.clientX, startY = e.clientY;
            
            const doResize = e => {
                el.style.width = (startW + (e.clientX - startX)) + 'px';
                el.style.height = (startH + (e.clientY - startY)) + 'px';
            };
            const stopResize = () => {
                window.removeEventListener('pointermove', doResize);
                window.removeEventListener('pointerup', stopResize);
            };
            window.addEventListener('pointermove', doResize);
            window.addEventListener('pointerup', stopResize);
        }

        function adjOpac(v) { document.getElementById('prompter').style.background = `rgba(0,0,0,${v})`; }

        // 3. 布局快速预设 (依然支持后期随意拖动)
        function toggleLayout() {
            layoutIdx = (layoutIdx + 1) % 3;
            const main = document.getElementById('main-wrapper');
            const bub = document.getElementById('bubble-wrapper');
            
            if (layoutIdx === 1) { // 左右
                main.style.cssText = "top:15%; left:5%; width:43%; height:50%;";
                bub.style.cssText = "top:15%; right:5%; width:43%; height:50%; left:auto;";
            } else if (layoutIdx === 2) { // 上下
                main.style.cssText = "top:5%; left:10%; width:80%; height:35%;";
                bub.style.cssText = "bottom:20%; left:10%; width:80%; height:35%; top:auto;";
            } else { // 重置为默认
                main.style.cssText = "top:10%; left:5%; width:90%; height:40%;";
                bub.style.cssText = "top:55%; left:25%; width:150px; height:150px;";
            }
        }

        function handleRecord() {
            isRecording = !isRecording;
            const btn = document.getElementById('shutter');
            btn.classList.toggle('recording', isRecording);

            if (isRecording) {
                recordedChunks = [];
                voiceText = "";
                startTime = Date.now();
                const options = { mimeType: 'video/mp4' };
                mediaRecorder = new MediaRecorder(currentStream, options);
                mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
                mediaRecorder.onstop = saveVideo;
                mediaRecorder.start();
                if(recognition) recognition.start();
            } else {
                mediaRecorder.stop();
                if(recognition) recognition.stop();
            }
        }

        // 4. 录制并存入历程 (不自动下载)
        async function saveVideo() {
            const videoBlob = new Blob(recordedChunks, { type: 'video/mp4' });
            const userText = document.getElementById('script-input').value || "未检测到语音";
            const duration = Math.floor((Date.now() - startTime) / 1000);
            
            const record = {
                id: Date.now(),
                date: new Date().toLocaleString(),
                video: videoBlob,
                content: userText,
                score: Math.min(100, 80 + Math.random() * 20).toFixed(0),
                advise: "AI 建议：保持目前节奏，在结尾处增加互动引导。"
            };

            const tx = db.transaction("assets", "readwrite");
            tx.objectStore("assets").add(record);
            alert("资产已存入历程，可前往查看并导出 MP4");
        }

        // 5. 从历程导出 MP4
        function downloadVid(id) {
            const tx = db.transaction("assets", "readonly");
            const getReq = tx.objectStore("assets").get(id);
            getReq.onsuccess = () => {
                const data = getReq.result;
                const url = URL.createObjectURL(data.video);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Behold_Export_${id}.mp4`;
                a.click();
            };
        }

        function deleteAsset(id) {
            if(confirm("确定删除此项资产吗？")) {
                db.transaction("assets", "readwrite").objectStore("assets").delete(id);
                toggleData();
            }
        }

        function expandCard(el) {
            const det = el.querySelector('.details');
            det.style.display = det.style.display === 'none' ? 'block' : 'none';
        }

        function toggleData() {
            const panel = document.getElementById('data-panel');
            const list = document.getElementById('history-list');
            panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';

            if (panel.style.display === 'flex') {
                list.innerHTML = "";
                const tx = db.transaction("assets", "readonly");
                tx.objectStore("assets").openCursor(null, "prev").onsuccess = e => {
                    const cursor = e.target.result;
                    if (cursor) {
                        const item = cursor.value;
                        const card = document.createElement('div');
                        card.className = 'history-card';
                        card.innerHTML = `
                            <div class="delete-btn" onclick="deleteAsset(${item.id})"><button style="background:none; border:none; color:white; font-weight:bold; cursor:pointer;">删除</button></div>
                            <div class="card-content" onclick="expandCard(this)">
                                <div style="display:flex; justify-content:space-between">
                                    <b>评分：${item.score}</b> <small>${item.date}</small>
                                </div>
                                <div class="details" style="display:none; margin-top:10px; font-size:13px; border-top:1px solid #333; padding-top:10px;">
                                    <p style="color:var(--ai-green)">语音资产：${item.content}</p>
                                    <p>AI 建议：${item.advise}</p>
                                    <button onclick="downloadVid(${item.id})" style="width:100%; padding:10px; background:var(--ai-green); border:none; border-radius:8px; font-weight:bold; margin-top:10px;">下载 MP4 到相册</button>
                                </div>
                            </div>
                        `;
                        // 左右滑动删除手势模拟
                        let startX;
                        card.addEventListener('touchstart', e => startX = e.touches[0].clientX);
                        card.addEventListener('touchmove', e => {
                            let diff = e.touches[0].clientX - startX;
                            if(diff < -50) card.style.transform = "translateX(-80px)";
                            if(diff > 50) card.style.transform = "translateX(0)";
                        });
                        list.appendChild(card);
                        cursor.continue();
                    }
                };
            }
        }

        function openScenePicker() {
            const picker = document.getElementById('scene-picker');
            picker.style.display = picker.style.display === 'flex' ? 'none' : 'flex';
            picker.innerHTML = sceneLibrary.map((s, idx) => `
                <div class="scene-card" style="background-image:url('${s.url}')" onclick="applyScene('${s.url}')">
                    <span>${s.name}</span>
                </div>
            `).join('');
        }

        function applyScene(url) {
            document.getElementById('scene-bg').style.backgroundImage = url ? `url(${url})` : 'none';
            document.getElementById('scene-picker').style.display = 'none';
        }

        window.onload = () => { 
            startSystem(); 
            makeDraggable('main-wrapper'); 
            makeDraggable('bubble-wrapper'); 
            makeDraggable('prompter'); 
        };
    </script>
</body>
</html>
