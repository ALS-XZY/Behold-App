<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Behold - 君临奇境</title>
    <style>
        :root { --accent: #ff3b30; --ai-green: #00ff88; }
        body { margin: 0; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; touch-action: none; }

        /* 背景层 */
        #scene-bg { position: absolute; inset: 0; z-index: 0; background-size: cover; background-position: center; opacity: 0.5; transition: 0.5s; }
        
        /* 智能视频容器：确保居中 */
        .video-wrapper { 
            position: absolute; overflow: hidden; display: flex; align-items: center; justify-content: center;
            background: #111; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* 主画面布局 */
        #main-wrapper { inset: 0; z-index: 1; }

        /* 自由气泡/分屏窗口 */
        #bubble-wrapper {
            z-index: 100; border: 1.5px solid var(--ai-green); border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: #000;
        }

        /* 提词器：极简透明 */
        .prompter-box {
            position: fixed; top: 15%; width: 86%; left: 7%; height: 160px;
            z-index: 150; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 12px; pointer-events: auto;
        }
        #script-input {
            width: 100%; height: 100%; background: transparent; border: none;
            color: var(--ai-green); font-size: 20px; font-weight: 500; resize: none; outline: none;
        }

        /* 极简文字导航栏 */
        .nav-bar {
            position: fixed; bottom: 30px; width: 92%; left: 4%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(20,20,20,0.9); padding: 12px 20px; border-radius: 20px; z-index: 200;
            box-sizing: border-box; border: 0.5px solid rgba(255,255,255,0.1);
        }
        .nav-btn { background: none; border: none; color: #fff; font-size: 15px; font-weight: 500; letter-spacing: 1px; }
        
        /* 录制按钮 */
        .rec-btn { width: 55px; height: 55px; border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .rec-core { width: 44px; height: 44px; background: var(--accent); border-radius: 50%; transition: 0.3s; }
        .recording .rec-core { border-radius: 4px; transform: scale(0.5); }

        /* 历程面板 */
        #data-panel {
            position: fixed; inset: 0; background: #000; z-index: 300; display: none;
            flex-direction: column; padding: 60px 25px;
        }

        .shape-circle { border-radius: 50% !important; }
        .shape-rect { border-radius: 12px !important; }
        .shape-capsule { border-radius: 40px !important; }

        #scene-picker {
            position: fixed; bottom: 100px; width: 100%; display: none; flex-direction: row;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            padding: 15px; gap: 10px; overflow-x: auto; z-index: 250;
            box-sizing: border-box;
        }
        .scene-thumb {
            flex: 0 0 80px; height: 60px; border-radius: 8px; border: 1px solid #444;
            background-size: cover; text-align: center; font-size: 10px; line-height: 60px;
            background-color: #222; color: #fff;
        }

        .ai-badge {
            position: absolute; top: 10px; right: 10px; background: var(--ai-green);
            color: #000; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="scene-bg"></div>
    
    <div id="main-wrapper" class="video-wrapper">
        <video id="video-bg" autoplay playsinline muted></video>
    </div>

    <div id="bubble-wrapper" class="video-wrapper" style="top: 450px; left: 30px; width: 140px; height: 180px;">
        <video id="video-bubble" autoplay playsinline muted></video>
    </div>

    <div class="prompter-box">
        <textarea id="script-input" placeholder="输入文案..."></textarea>
    </div>

    <div id="scene-picker"></div>

    <div class="nav-bar">
        <button class="nav-btn" onclick="toggleData()">历程</button>
        <button class="nav-btn" onclick="openScenePicker()">场景</button>
        <button class="rec-btn" onclick="handleRecord()"><div class="rec-core"></div></button>
        <button class="nav-btn" onclick="switchCam()">切换</button>
        <button class="nav-btn" onclick="toggleLayout()">布局</button>
        <button class="nav-btn" onclick="changeShape()">形状</button>
    </div>

    <div id="data-panel">
        <h2 style="color:var(--ai-green)">成长轨迹</h2>
        <div id="history-list" style="flex: 1; overflow-y: auto; margin: 20px 0;"></div>
        <button onclick="toggleData()" style="padding: 18px; background: #222; border: none; color: #fff; border-radius: 12px;">返回</button>
    </div>

    <script>
        let mediaRecorder, recordedChunks = [], currentStream, isRecording = false;
        let facingMode = "user";
        let startTime;

        const sceneLibrary = [
            { name: '原生', url: '' },
            { name: '发布会', url: 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30' },
            { name: '讲堂', url: 'https://images.unsplash.com/photo-1517245386807-bb43f82c33c4' },
            { name: '旅游', url: 'https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1' },
            { name: '备忘录', url: 'https://images.unsplash.com/photo-1517842645767-c639042777db' }
        ];

        async function startSystem() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }, 
                    audio: true 
                });
                const bgV = document.getElementById('video-bg');
                const bubV = document.getElementById('video-bubble');
                bgV.srcObject = currentStream;
                bubV.srcObject = currentStream;
                const transform = facingMode === "user" ? "scaleX(-1)" : "scaleX(1)";
                bgV.style.transform = transform;
                bubV.style.transform = transform;
            } catch (err) { alert("镜头启动失败，请检查权限"); }
        }

        function switchCam() {
            facingMode = facingMode === "user" ? "environment" : "user";
            startSystem();
        }

        let layoutIdx = 0;
        function toggleLayout() {
            layoutIdx = (layoutIdx + 1) % 3;
            const main = document.getElementById('main-wrapper');
            const bub = document.getElementById('bubble-wrapper');
            
            if (layoutIdx === 1) {
                main.style.cssText = "left:0; top:0; width:50%; height:100%; border-right:1px solid #333";
                bub.style.cssText = "right:0; top:0; width:50%; height:100%; border-radius:0; border:none";
            } else if (layoutIdx === 2) {
                main.style.cssText = "left:0; top:0; width:100%; height:50%; border-bottom:1px solid #333";
                bub.style.cssText = "left:0; bottom:0; width:100%; height:50%; border-radius:0; border:none";
            } else {
                main.style.cssText = "inset:0; width:100%; height:100%;";
                bub.style.cssText = "top:450px; left:30px; width:140px; height:180px; border-radius:12px;";
            }
        }

        function changeShape() {
            const bub = document.getElementById('bubble-wrapper');
            if (bub.classList.contains('shape-rect')) {
                bub.classList.replace('shape-rect', 'shape-circle');
            } else if (bub.classList.contains('shape-circle')) {
                bub.classList.replace('shape-circle', 'shape-capsule');
            } else {
                bub.classList.remove('shape-capsule', 'shape-circle');
                bub.classList.add('shape-rect');
            }
        }

        function handleRecord() {
            if (!isRecording) {
                recordedChunks = [];
                startTime = Date.now();
                const options = { mimeType: 'video/webm;codecs=vp9,opus' };
                mediaRecorder = new MediaRecorder(currentStream, options);
                mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
                mediaRecorder.onstop = saveVideo;
                mediaRecorder.start();
                document.body.classList.add('recording');
            } else {
                mediaRecorder.stop();
                document.body.classList.remove('recording');
            }
            isRecording = !isRecording;
        }

        function processAIRecap(duration, userText) {
            const baseText = userText || "系统未检测到预设文案，已根据拍摄氛围自动分析...";
            const hooks = ["【爆款预定】", "【情绪深度】", "【知识干货】"];
            const randomHook = hooks[Math.floor(Math.random() * hooks.length)];
            
            return {
                score: Math.min(100, 80 + Math.random() * 20).toFixed(0),
                optimized: `${randomHook}\n建议标题：既然刷到了，这分钟送给正在努力的你。\n\n复盘：录制 ${duration}s。画面光感均匀。建议后期导出时在第 2 秒加入"${baseText.substring(0,5)}..."的文字贴纸。`,
                origin: baseText
            };
        }

        function saveVideo() {
            const blob = new Blob(recordedChunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Behold_${Date.now()}.mp4`;
            a.click();
            
            const userText = document.getElementById('script-input').value;
            const duration = Math.floor((Date.now() - startTime) / 1000);
            const recap = processAIRecap(duration, userText);
            
            let logs = JSON.parse(localStorage.getItem('behold_v3_logs') || '[]');
            logs.unshift({ date: new Date().toLocaleString(), ...recap });
            localStorage.setItem('behold_v3_logs', JSON.stringify(logs));
            
            showGrowthTrack(recap);
        }

        function toggleData() {
            const panel = document.getElementById('data-panel');
            const list = document.getElementById('history-list');
            const isVisible = panel.style.display === 'flex';
            panel.style.display = isVisible ? 'none' : 'flex';
            if(!isVisible) {
                let logs = JSON.parse(localStorage.getItem('behold_v3_logs') || '[]');
                list.innerHTML = logs.map(l => `<div style="padding:15px; background:#111; margin-bottom:10px; border-radius:8px;">
                    ✅ 已完成录制：${l.date}<br>
                    <span style="color:var(--ai-green); font-size:14px;">得分：${l.score}</span>
                </div>`).join('');
            }
        }

        function showGrowthTrack(recap) {
            const panel = document.getElementById('data-panel');
            panel.style.display = 'flex';
            document.getElementById('history-list').innerHTML = `
                <div style="background:#111; padding:20px; border-radius:15px; border:1px solid var(--ai-green);">
                    <h3 style="margin-top:0">✨ AI 复盘得分：${recap.score}</h3>
                    <p style="font-size:13px; color:#888;">优化方案：</p>
                    <div id="ai-recap-text" style="font-size:14px; line-height:1.6; background:#000; padding:10px; border-radius:8px; margin:10px 0;">
                        ${recap.optimized.replace(/\n/g, '<br>')}
                    </div>
                    <button onclick="copyAI('ai-recap-text')" style="background:var(--ai-green); color:#000; border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">复制建议</button>
                </div>
            `;
        }

        function copyAI(textId) {
            const text = document.getElementById(textId).innerText;
            navigator.clipboard.writeText(text).then(() => alert("AI 建议已复制！"));
        }

        function openScenePicker() {
            const picker = document.getElementById('scene-picker');
            picker.style.display = picker.style.display === 'flex' ? 'none' : 'flex';
            picker.innerHTML = sceneLibrary.map((s, idx) => `
                <div class="scene-thumb" style="background-image:url('${s.url}');" onclick="applyScene('${s.url}')">
                    ${s.name}
                </div>
            `).join('');
        }

        function applyScene(url) {
            document.getElementById('scene-bg').style.backgroundImage = url ? `url(${url})` : 'none';
            document.getElementById('scene-picker').style.display = 'none';
        }

        let isDragging = false, sx, sy;
        const bub = document.getElementById('bubble-wrapper');
        bub.onpointerdown = e => { if(layoutIdx !== 0) return; isDragging = true; sx = e.clientX - bub.offsetLeft; sy = e.clientY - bub.offsetTop; bub.setPointerCapture(e.pointerId); };
        bub.onpointermove = e => { if(!isDragging) return; bub.style.left = (e.clientX - sx) + 'px'; bub.style.top = (e.clientY - sy) + 'px'; };
        bub.onpointerup = () => isDragging = false;

        window.onload = startSystem;
    </script>
</body>
</html>
