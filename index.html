<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Behold - 君临奇境</title>
    <style>
        :root { --accent: #ff3b30; --ai-green: #00ff88; --glass: rgba(255,255,255,0.1); }
        body { margin: 0; background: #000; color: white; font-family: -apple-system; overflow: hidden; height: 100vh; touch-action: none; }

        /* 背景贴纸层 */
        #scene-bg {
            position: absolute; inset: 0; z-index: 0;
            background-size: cover; background-position: center;
            opacity: 0.4; pointer-events: none;
        }

        /* 视频容器 */
        #video-bg { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        
        /* 自由拖拽气泡 */
        #bubble {
            position: absolute; width: 150px; height: 150px;
            border-radius: 20px; border: 2px solid var(--ai-green);
            z-index: 100; overflow: hidden; background: #000;
            touch-action: none; cursor: move;
        }
        #video-bubble { width: 100%; height: 100%; object-fit: cover; }

        /* 提词器：支持手动输入 */
        .prompter-box {
            position: fixed; top: 100px; width: 90%; left: 5%; height: 180px;
            z-index: 50; background: var(--glass); backdrop-filter: blur(10px);
            border-radius: 15px; padding: 15px; box-sizing: border-box;
        }
        #script-input {
            width: 100%; height: 100%; background: transparent; border: none;
            color: #fff; font-size: 18px; resize: none; outline: none;
        }
        .highlight-text { color: var(--ai-green); font-weight: bold; }

        /* 底部控制面板 */
        .nav-bar {
            position: fixed; bottom: 20px; width: 94%; left: 3%;
            display: flex; justify-content: space-around; align-items: center;
            background: rgba(0,0,0,0.8); padding: 15px 0; border-radius: 25px; z-index: 200;
        }
        .btn-icon { background: none; border: none; color: white; font-size: 20px; }
        .rec-btn { width: 60px; height: 60px; border: 3px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .rec-core { width: 45px; height: 45px; background: var(--accent); border-radius: 50%; transition: 0.3s; }
        .recording .rec-core { border-radius: 8px; transform: scale(0.6); }

        /* 数据看板 */
        #data-panel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 300;
            display: none; flex-direction: column; padding: 40px 20px;
        }
    </style>
</head>
<body>

    <div id="scene-bg"></div>
    <video id="video-bg" autoplay playsinline muted></video>

    <div id="bubble" style="top: 400px; left: 200px;">
        <video id="video-bubble" autoplay playsinline muted></video>
    </div>

    <div class="prompter-box">
        <textarea id="script-input" placeholder="在此输入或粘贴你的文案..."></textarea>
    </div>

    <div class="nav-bar">
        <button class="btn-icon" onclick="toggleData()">📊 历程</button>
        <button class="btn-icon" onclick="changeScene()">🖼️ 场景</button>
        <button class="rec-btn" onclick="handleRecord()">
            <div class="rec-core" id="rec-core"></div>
        </button>
        <button class="btn-icon" onclick="switchCam()">🔄 切换</button>
        <button class="btn-icon" onclick="toggleLayout()">📱 布局</button>
    </div>

    <div id="data-panel">
        <h2>📈 成长轨迹</h2>
        <div id="history-list" style="overflow-y: auto; flex: 1;"></div>
        <button onclick="toggleData()" style="padding: 15px; background: var(--ai-green); border: none; border-radius: 10px; margin-top: 20px;">关闭</button>
    </div>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        let currentStream;
        let isRecording = false;

        // 1. 拖拽逻辑 (支持桌面和移动端)
        const bubble = document.getElementById('bubble');
        let isDragging = false;
        let startX, startY;

        bubble.onpointerdown = (e) => {
            isDragging = true;
            startX = e.clientX - bubble.offsetLeft;
            startY = e.clientY - bubble.offsetTop;
            bubble.setPointerCapture(e.pointerId);
        };

        bubble.onpointermove = (e) => {
            if (!isDragging) return;
            bubble.style.left = (e.clientX - startX) + 'px';
            bubble.style.top = (e.clientY - startY) + 'px';
        };

        bubble.onpointerup = () => isDragging = false;

        // 2. 录制逻辑 (保存到本地)
        async function startSystem() {
            currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('video-bg').srcObject = currentStream;
            document.getElementById('video-bubble').srcObject = currentStream;
        }

        function handleRecord() {
            if (!isRecording) {
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(currentStream);
                mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
                mediaRecorder.onstop = downloadVideo;
                mediaRecorder.start();
                document.body.classList.add('recording');
            } else {
                mediaRecorder.stop();
                document.body.classList.remove('recording');
                saveToHistory();
            }
            isRecording = !isRecording;
        }

        function downloadVideo() {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Behold_${Date.now()}.webm`;
            a.click();
        }

        // 3. 场景切换
        const scenes = [
            '', 
            'https://images.unsplash.com/photo-1492684223066-81342ee5ff30', // 发布会
            'https://images.unsplash.com/photo-1516321318423-f06f85e504b3', // 教学
            'https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1'  // 旅游
        ];
        let sceneIdx = 0;
        function changeScene() {
            sceneIdx = (sceneIdx + 1) % scenes.size;
            document.getElementById('scene-bg').style.backgroundImage = `url(${scenes[sceneIdx]})`;
        }

        // 4. 历史记录
        function saveToHistory() {
            let logs = JSON.parse(localStorage.getItem('behold_logs') || '[]');
            logs.push({ date: new Date().toLocaleString(), count: logs.length + 1 });
            localStorage.setItem('behold_logs', JSON.stringify(logs));
        }

        function toggleData() {
            const panel = document.getElementById('data-panel');
            const list = document.getElementById('history-list');
            panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
            
            let logs = JSON.parse(localStorage.getItem('behold_logs') || '[]');
            list.innerHTML = logs.map(l => `<div style="padding:10px; border-bottom:1px solid #333;">第${l.count}次录制 - ${l.date}</div>`).join('');
        }

        // 5. 布局切换
        let layoutIdx = 0;
        function toggleLayout() {
            layoutIdx = (layoutIdx + 1) % 3;
            if (layoutIdx === 1) { // 左右
                bubble.style.width = "50%"; bubble.style.height = "100%"; bubble.style.top = "0"; bubble.style.left = "0"; bubble.style.borderRadius = "0";
            } else if (layoutIdx === 2) { // 上下
                bubble.style.width = "100%"; bubble.style.height = "50%"; bubble.style.top = "0"; bubble.style.left = "0"; bubble.style.borderRadius = "0";
            } else { // 恢复气泡
                bubble.style.width = "150px"; bubble.style.height = "150px"; bubble.style.borderRadius = "20px";
            }
        }

        window.onload = startSystem;
    </script>
</body>
</html>
