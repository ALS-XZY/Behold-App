<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Behold V5.0 - 旗舰影像系统</title>
    <style>
        :root { --accent: #ff3b30; --ai-green: #00ff88; }
        body { margin: 0; background: #000; color: white; font-family: -apple-system; overflow: hidden; height: 100vh; touch-action: none; }

        /* 渲染画布 - 隐藏但作为录制源 */
        #render-canvas { position: fixed; top: -9999px; left: -9999px; width: 1280px; height: 720px; }

        #scene-bg { position: absolute; inset: 0; z-index: 0; background-size: cover; background-position: center; transition: 0.5s; }

        /* 视频容器：彻底移除线条边框 */
        .video-wrapper { 
            position: absolute; overflow: hidden; display: flex; align-items: center; justify-content: center;
            background: transparent; z-index: 10; touch-action: none; border: none; /* 移除线条 */
        }
        video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* 形状库：纯透明边框 */
        .shape-square { border-radius: 24px; }
        .shape-circle { clip-path: circle(50% at 50% 50%); }
        .shape-heart { clip-path: path('M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.568-3.956 4.407-4.457 5.719-4.457 2.213 0 5.281 1.4 5.281 5.191 0 4.105-5.37 8.863-11 14.402z'); }

        .resizer { width: 30px; height: 30px; background: rgba(255,255,255,0.1); position: absolute; right: 0; bottom: 0; cursor: nwse-resize; z-index: 100; border-radius: 50% 0 0 0; }

        #prompter {
            position: absolute; z-index: 150; padding: 15px; border-radius: 20px;
            display: flex; flex-direction: column; min-width: 250px; background: rgba(0,0,0,0.5);
        }
        #script-input { flex: 1; background: transparent; border: none; color: #fff; font-size: 20px; outline: none; resize: none; }

        /* 快门 UI */
        .shutter-btn { width: 80px; height: 80px; position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .shutter-iris { width: 70px; height: 70px; border: 3px solid #fff; border-radius: 50%; position: relative; overflow: hidden; }
        .blade { position: absolute; width: 100%; height: 100%; background: #111; clip-path: polygon(50% 50%, 100% 0, 100% 70%); transition: 0.3s; transform-origin: center; border: 0.5px solid var(--accent); }
        .recording .blade { transform: rotate(40deg) scale(0.5); background: var(--accent); }

        .nav-bar { position: fixed; bottom: 30px; width: 92%; left: 4%; display: flex; justify-content: space-around; align-items: center; background: rgba(20,20,20,0.9); padding: 10px; border-radius: 40px; z-index: 300; backdrop-filter: blur(10px); }
        .nav-text { background: none; border: none; color: #fff; font-size: 14px; }

        #data-panel { position: fixed; inset: 0; background: #000; z-index: 500; display: none; flex-direction: column; padding: 60px 25px; }
    </style>
</head>
<body>

    <canvas id="render-canvas" width="1280" height="720"></canvas>

    <div id="scene-bg"></div>
    
    <div id="layer-A" class="video-wrapper shape-square" style="top:10%; left:5%; width:90%; height:45%;">
        <video id="v-A" autoplay playsinline muted></video>
        <div class="resizer" onpointerdown="startResize(event, 'layer-A')"></div>
    </div>

    <div id="layer-B" class="video-wrapper shape-heart" style="top:60%; left:10%; width:150px; height:150px;">
        <video id="v-B" autoplay playsinline muted></video>
        <div class="resizer" onpointerdown="startResize(event, 'layer-B')"></div>
    </div>

    <div id="prompter">
        <textarea id="script-input" placeholder="输入文案..."></textarea>
        <input type="range" min="0" max="1" step="0.1" value="0.5" oninput="adjAlpha(this.value)">
        <div class="resizer" onpointerdown="startResize(event, 'prompter')"></div>
    </div>

    <div class="nav-bar">
        <button class="nav-text" onclick="toggleData()">历程</button>
        <div class="shutter-btn" onclick="toggleRecording()">
            <div class="shutter-iris" id="iris">
                <div class="blade" style="transform:rotate(0deg)"></div>
                <div class="blade" style="transform:rotate(60deg)"></div>
                <div class="blade" style="transform:rotate(120deg)"></div>
                <div class="blade" style="transform:rotate(180deg)"></div>
                <div class="blade" style="transform:rotate(240deg)"></div>
                <div class="blade" style="transform:rotate(300deg)"></div>
            </div>
        </div>
        <button class="nav-text" onclick="switchCam()">切换</button>
        <button class="nav-text" onclick="cycleShape()">形状</button>
    </div>

    <div id="data-panel">
        <h2 style="color:var(--ai-green)">历程资产</h2>
        <div id="history-list" style="flex:1; overflow-y:auto;"></div>
        <button onclick="toggleData()" style="padding:20px; background:#222; border:none; color:#fff; border-radius:15px;">关闭</button>
    </div>

    <script>
        let db, recorder, chunks = [], isRecording = false, stream, canvasStream;
        let currentFacing = "user";
        const canvas = document.getElementById('render-canvas');
        const ctx = canvas.getContext('2d');

        // 初始化数据库
        const req = indexedDB.open("BeholdProd", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("assets", {keyPath: "id"});
        req.onsuccess = e => db = e.target.result;

        async function initCam() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: currentFacing}, audio: true});
            document.getElementById('v-A').srcObject = stream;
            document.getElementById('v-B').srcObject = stream;
        }

        function switchCam() {
            currentFacing = currentFacing === "user" ? "environment" : "user";
            initCam(); // 录制不会停止，因为recorder绑定的是Canvas或独立的MediaStream
        }

        // 核心：Canvas 渲染循环 (实现“所见即所得”的画面合成)
        function drawFrame() {
            ctx.clearRect(0,0,1280,720);
            // 1. 画背景图
            const bg = document.getElementById('scene-bg');
            if(bg.style.backgroundImage) ctx.fillStyle = "#222"; // 简化：实际可绘制图片
            // 2. 画主视频 A
            const vA = document.getElementById('v-A');
            ctx.drawImage(vA, 0, 0, 1280, 720);
            // 3. 画浮窗 B
            const vB = document.getElementById('v-B');
            ctx.save();
            ctx.beginPath(); ctx.arc(1000, 200, 150, 0, Math.PI*2); ctx.clip();
            ctx.drawImage(vB, 850, 50, 300, 300);
            ctx.restore();

            if(isRecording) requestAnimationFrame(drawFrame);
        }

        function toggleRecording() {
            isRecording = !isRecording;
            document.getElementById('iris').parentElement.classList.toggle('recording', isRecording);
            
            if (isRecording) {
                chunks = [];
                drawFrame();
                const combinedStream = new MediaStream([
                    canvas.captureStream(30).getVideoTracks()[0],
                    stream.getAudioTracks()[0]
                ]);
                recorder = new MediaRecorder(combinedStream, {mimeType: 'video/webm;codecs=vp8'});
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = saveAsset;
                recorder.start();
            } else {
                recorder.stop();
            }
        }

        async function saveAsset() {
            const blob = new Blob(chunks, {type: 'video/mp4'});
            const id = Date.now();
            db.transaction("assets", "readwrite").objectStore("assets").add({
                id: id, video: blob, date: new Date().toLocaleString()
            });
            // 自动触发导出下载
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `Behold_Record_${id}.mp4`;
            a.click();
        }

        // 交互逻辑保持
        function startResize(e, id) {
            e.stopPropagation(); const el = document.getElementById(id);
            const sw = el.offsetWidth, sh = el.offsetHeight, sx = e.clientX, sy = e.clientY;
            const mv = e => { el.style.width=(sw+(e.clientX-sx))+'px'; el.style.height=(sh+(e.clientY-sy))+'px'; };
            const up = () => { window.removeEventListener('pointermove', mv); window.removeEventListener('pointerup', up); };
            window.addEventListener('pointermove', mv); window.addEventListener('pointerup', up);
        }

        function makeDraggable(id) {
            const el = document.getElementById(id); let off = [0,0], down = false;
            el.onpointerdown = e => { if(e.target.className==='resizer'||e.target.tagName==='TEXTAREA') return; down=true; off=[el.offsetLeft-e.clientX, el.offsetTop-e.clientY]; el.setPointerCapture(e.pointerId); };
            el.onpointermove = e => { if(down){ el.style.left=(e.clientX+off[0])+'px'; el.style.top=(e.clientY+off[1])+'px'; }};
            el.onpointerup = () => down = false;
        }

        function toggleData() {
            const p = document.getElementById('data-panel');
            p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
        }

        window.onload = () => {
            initCam();
            ['layer-A', 'layer-B', 'prompter'].forEach(makeDraggable);
        };
    </script>
</body>
</html>
